name: Update arXiv archive

on:
  schedule:
    # 14:30 Beijing (UTC+8) = 06:30 UTC, after arXiv daily release at 13:00 Beijing
    - cron: "30 6 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional archive date: YYYY-MM-DD"
        required: false
        type: string
      days:
        description: "Number of days to fetch ending at date (default: 1)"
        required: false
        default: "1"
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch arXiv papers
        run: |
          DAYS="${{ github.event.inputs.days }}"
          DATE="${{ github.event.inputs.date }}"
          ARGS="--timezone Asia/Shanghai --max-results 700"
          if [ -n "$DATE" ]; then
            ARGS="$ARGS --date $DATE"
          fi
          if [ -n "$DAYS" ]; then
            ARGS="$ARGS --days $DAYS"
          fi
          python scripts/fetch_arxiv.py $ARGS

      - name: Commit archive updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/papers
          if git diff --cached --quiet; then
            echo "No archive changes."
          else
            git commit -m "Update arXiv archive"
            git push
          fi
